<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Resident Search</title>

<script>
window.onload = function () {

    let flat = window.location.hash.replace("#","");

    if (!flat) {
        document.getElementById("msg").innerHTML =
            "Use URL:<br><br><b>https://parvatinandan.github.io/mysoc/#209</b>";
        return;
    }

    const APP_URL =
        "https://script.google.com/macros/s/AKfycbya3dkkulMawjTLh2elzIZCHyrsTD8X0pnvNsD2-5By3uZM6o2jv6ITBDiEeLRX8Bk/exec";

    window.location.href =
        APP_URL + "?flat=" + encodeURIComponent(flat);
};
</script>

<style>
body{
    font-family:Arial,sans-serif;
    text-align:center;
    padding:40px;
}
.box{
    max-width:500px;
    margin:auto;
    border:1px solid #ddd;
    border-radius:10px;
    padding:20px;
}
</style>
</head>

<body>

<div class="box">
    <h2>Resident Search</h2>
    <p id="msg">Loading...</p>
</div>

</body>
</html>
