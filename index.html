<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Society Parking</title>
  <script>
    // Get flat number from URL
    let path = window.location.pathname;

    // Remove repository name
    path = path.replace('/mysoc', '');

    // Get last path part
    let flat = path.split('/').filter(Boolean).pop();

    // Default page if no flat provided
    if (!flat) {
      document.write("<h2>Invalid Flat Number</h2>");
    } else {

      // YOUR APPS SCRIPT URL
      const APP_URL =
      "https://script.google.com/macros/s/AKfycbyM4VNt0mHbx_Q-B7tCXu4zze6Uqoog7gp4vPN0kg/exec";

      // Redirect
      window.location.replace(
        APP_URL + "?flat=" + encodeURIComponent(flat)
      );
    }
  </script>
</head>
<body>
  Redirecting...
</body>
</html>
