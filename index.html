<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Redirecting...</title>

<script>
let path = window.location.pathname;

// Remove repository name
path = path.replace('/mysoc', '');

// Get flat number
const flat = path.split('/').filter(Boolean).pop();

const APP_URL =
"https://script.google.com/macros/s/AKfycbyM4VNt0mHbx_Q-B7tCXu4zze6Uqoog7gp4vPN0kg/dev";

if (flat) {
  window.location.replace(
    APP_URL + "?flat=" + encodeURIComponent(flat)
  );
}
</script>

</head>
<body>
Redirecting...
</body>
</html>
